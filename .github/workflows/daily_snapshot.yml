name: East Coast Gas Daily Pipeline

on:
  schedule:
    # 23:00 UTC = 09:00 AEST (次日)
    - cron: '0 23 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击运行，方便调试

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python pipeline.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ reports/ docs/
          # 只有在有更改时才 commit，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily snapshot [skip ci]" && git push)